<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcard Revision</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Debug Panel -->
    <div id="debug-panel" class="debug-panel hidden">
      <div class="debug-header">Loading decks...</div>
      <div id="debug-logs" class="debug-logs"></div>
    </div>

    <!-- Auth Screen -->
    <div id="auth-screen" class="screen active">
      <header class="app-header">
        <h1>Flashcard Revision</h1>
        <p class="subtitle">Sign in to sync progress across devices</p>
      </header>
      <div class="auth-container">
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">Sign In</button>
          <button class="auth-tab" data-tab="signup">Sign Up</button>
        </div>
        <form id="auth-form" class="auth-form">
          <input type="email" id="auth-email" placeholder="Email" required autocomplete="email">
          <input type="password" id="auth-password" placeholder="Password" required autocomplete="current-password" minlength="6">
          <button type="submit" id="auth-submit-btn" class="btn-primary auth-submit">Sign In</button>
          <p id="auth-error" class="auth-error hidden"></p>
        </form>
        <button id="skip-auth-btn" class="btn-text auth-skip">Continue without signing in</button>
      </div>
    </div>

    <!-- Home Screen -->
    <div id="home-screen" class="screen">
      <header class="app-header">
        <h1>Flashcard Revision</h1>
        <p class="subtitle">Spaced repetition flashcard practice</p>
        <div id="user-bar" class="user-bar hidden">
          <span id="user-email" class="user-email"></span>
          <button id="sync-now-btn" class="btn-sync" title="Sync now">&#x21BB;</button>
          <button id="logout-btn" class="btn-text">Sign out</button>
        </div>
      </header>
      <div id="deck-grid" class="deck-grid"></div>
      <footer class="app-footer">
        <button id="view-incorrect-btn" class="btn-footer">View incorrect cards</button>
        <button id="reset-progress-btn" class="btn-footer btn-footer-danger">Reset all progress</button>
      </footer>
    </div>

    <!-- Deck Screen -->
    <div id="deck-screen" class="screen">
      <header class="deck-header">
        <button id="back-home-btn" class="btn-back" aria-label="Back to home">&larr;</button>
        <div class="deck-header-text">
          <h2 id="deck-title"></h2>
          <p id="deck-progress-summary" class="subtitle"></p>
        </div>
      </header>
      <div class="progress-bar-container">
        <div id="progress-bar" class="progress-bar"></div>
        <span id="progress-text" class="progress-text"></span>
      </div>

      <!-- Flashcard -->
      <div class="card-area">
        <div id="flashcard" class="card">
          <div class="card-question">
            <div class="card-content" id="card-front-text"></div>
            <div class="card-hint" id="card-hint">Tap to reveal answer</div>
          </div>
          <div class="card-answer-section hidden" id="card-answer-section">
            <div class="card-divider"></div>
            <div class="card-answer" id="card-back-text"></div>
          </div>
        </div>

        <!-- Rating buttons (shown after reveal) -->
        <div id="rating-buttons" class="rating-buttons hidden">
          <p class="rating-prompt">How well did you know this?</p>
          <div class="rating-row">
            <button class="btn-rating hard" data-rating="hard">Hard<span class="rating-key">1</span></button>
            <button class="btn-rating ok" data-rating="ok">OK<span class="rating-key">2</span></button>
            <button class="btn-rating easy" data-rating="easy">Very Easy<span class="rating-key">3</span></button>
          </div>
        </div>
      </div>

      <div class="deck-stats" id="deck-stats"></div>
      <div id="mark-incorrect-area" class="mark-incorrect-area hidden">
        <button id="mark-incorrect-btn" class="btn-incorrect">Mark as incorrect</button>
      </div>
      <div class="reset-deck-area">
        <button id="reset-deck-btn" class="btn-reset-deck">Reset this deck</button>
      </div>
    </div>

    <!-- Incorrect Cards Screen -->
    <div id="incorrect-screen" class="screen">
      <header class="deck-header">
        <button id="back-home-btn-incorrect" class="btn-back" aria-label="Back to home">&larr;</button>
        <div class="deck-header-text">
          <h2>Incorrect Cards</h2>
          <p class="subtitle">Cards marked as incorrect across all decks</p>
        </div>
      </header>
      <div id="incorrect-list"></div>
      <div id="incorrect-empty" class="incorrect-empty hidden">No cards have been marked as incorrect.</div>
      <div class="incorrect-actions" id="incorrect-actions">
        <button id="download-incorrect-btn" class="btn-primary">Download incorrect lines</button>
        <button id="clear-incorrect-btn" class="btn-text">Clear all incorrect marks</button>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase-config.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch((err) => {
          console.warn('Service worker registration failed:', err);
        });
      });
      // When a new service worker takes control (after skipWaiting), reload to
      // pick up the freshly cached files instead of serving the old cached version.
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        window.location.reload();
      });
    }
  </script>
</body>
</html>
